---
- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "~/.ssh"
    state: directory
    mode: "0700"

- name: Add GitHub SSH host keys to known_hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "{{ item }}"
    path: "~/.ssh/known_hosts"
    state: present
  loop: "{{ ssh_config_github_known_hosts }}"
