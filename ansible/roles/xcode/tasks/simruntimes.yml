---
- name: Find simulator runtime .dmg files in local cache
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../../.cache/simruntime"
    patterns: "*.dmg"
  delegate_to: localhost
  become: false
  register: xcode_simruntime_files

- name: Select simulator runtime .dmg files to install
  ansible.builtin.set_fact:
    xcode_selected_simruntime_files: []

- name: Build simulator runtime .dmg selection list
  ansible.builtin.set_fact:
    xcode_selected_simruntime_files: "{{ xcode_selected_simruntime_files + [item] }}"
  loop: "{{ xcode_simruntime_files.files }}"
  when: (xcode_cache_simruntime_dmg_files | length == 0) or ((item.path | basename) in xcode_cache_simruntime_dmg_files)

- name: Install simulator runtimes from cache
  when: xcode_selected_simruntime_files | length > 0
  block:
    - name: Create temp directory for simulator runtime cache on remote
      ansible.builtin.tempfile:
        state: directory
        suffix: simruntime_cache
      register: xcode_simruntime_tmpdir

    - name: Copy simulator runtime .dmg files to remote
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ xcode_simruntime_tmpdir.path }}/"
        mode: "0644"
      loop: "{{ xcode_selected_simruntime_files }}"

    - name: Install simulator runtimes
      ansible.builtin.command:
        cmd: xcrun simctl runtime add {{ xcode_simruntime_tmpdir.path }}/{{ item.path | basename }}
      become: true
      changed_when: true
      loop: "{{ xcode_selected_simruntime_files }}"

    - name: Remove simulator runtime cache from remote
      ansible.builtin.file:
        path: "{{ xcode_simruntime_tmpdir.path }}"
        state: absent
