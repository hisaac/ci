---
- name: Find Xcode .xip files in local cache
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../../.cache/xcode"
    patterns: "*.xip"
  delegate_to: localhost
  become: false
  register: xcode_xip_files

- name: Select Xcode .xip files to install
  ansible.builtin.set_fact:
    xcode_selected_xip_files: []

- name: Build Xcode .xip selection list
  ansible.builtin.set_fact:
    xcode_selected_xip_files: "{{ xcode_selected_xip_files + [item] }}"
  loop: "{{ xcode_xip_files.files }}"
  when: (xcode_cache_xip_files | length == 0) or ((item.path | basename) in xcode_cache_xip_files)

- name: Install Xcode versions from cache
  when: xcode_selected_xip_files | length > 0
  block:
    - name: Create temp directory for Xcode cache on remote
      ansible.builtin.tempfile:
        state: directory
        suffix: xcode_cache
      register: xcode_remote_tmpdir

    - name: Copy Xcode .xip files to remote
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ xcode_remote_tmpdir.path }}/"
        mode: "0644"
      loop: "{{ xcode_selected_xip_files }}"

    - name: Initialize Xcode install plan
      ansible.builtin.set_fact:
        xcode_install_plan: []

    - name: Build Xcode install plan
      ansible.builtin.set_fact:
        xcode_install_plan: "{{ xcode_install_plan + [xcode_install_item] }}"
      vars:
        xcode_install_item:
          version: "{{ item.path | basename | regex_search('[0-9]+(\\.[0-9]+){1,2}') }}"
          xip_path: "{{ xcode_remote_tmpdir.path }}/{{ item.path | basename }}"
      loop: "{{ xcode_selected_xip_files }}"

    - name: Check standard xcodes install paths
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /opt/homebrew/bin/xcodes
        - /usr/local/bin/xcodes
      register: xcode_xcodes_candidates

    - name: Set xcodes binary path
      ansible.builtin.set_fact:
        xcode_xcodes_path: "{{ (xcode_xcodes_candidates.results | selectattr('stat.exists') | map(attribute='item') | list | first) | default('') }}"

    - name: Ensure xcodes is installed on remote host
      ansible.builtin.assert:
        that:
          - xcode_xcodes_path | length > 0
        fail_msg: xcodes binary not found in /opt/homebrew/bin or /usr/local/bin on remote host.

    - name: Check whether planned Xcode versions are already installed
      ansible.builtin.stat:
        path: "/Applications/Xcode-{{ item.version }}.app"
      loop: "{{ xcode_install_plan }}"
      register: xcode_installed_apps

    - name: Install Xcode versions with xcodes
      ansible.builtin.command:
        argv:
          - "{{ xcode_xcodes_path }}"
          - install
          - "{{ item.1.version }}"
          - --path
          - "{{ item.1.xip_path }}"
          - --directory
          - /Applications
      become: true
      changed_when: true
      loop: "{{ xcode_installed_apps.results | zip(xcode_install_plan) | list }}"
      when: not item.0.stat.exists

    - name: Select default Xcode version with xcodes
      ansible.builtin.command:
        argv:
          - "{{ xcode_xcodes_path }}"
          - select
          - "{{ xcode_default_version }}"
      become: true
      changed_when: true
      when: xcode_default_version | length > 0

    - name: Reset Xcode selection when no default is configured
      ansible.builtin.command:
        argv:
          - /usr/bin/xcode-select
          - --reset
      become: true
      changed_when: true
      when: xcode_default_version | length == 0

    - name: Remove Xcode cache from remote
      ansible.builtin.file:
        path: "{{ xcode_remote_tmpdir.path }}"
        state: absent
