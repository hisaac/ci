---
# Window Manager

- name: Disable Click to Show Desktop
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: EnableStandardClickToShowDesktop
    type: bool
    value: false

- name: Hide widgets on Desktop and in Stage Manager
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: "{{ item }}"
    type: bool
    value: true
  loop:
    - StandardHideWidgets
    - StageManagerHideWidgets

# Tips

- name: Disable Tips feature and notifications
  community.general.osx_defaults:
    domain: com.apple.tipsd
    key: "{{ item }}"
    type: bool
    value: true
  loop:
    - SiriTipsDisabled
    - TipsDisabled

# Login window

- name: Disable reopening of apps on login
  community.general.osx_defaults:
    domain: com.apple.loginwindow
    key: "{{ item }}"
    type: bool
    value: false
  loop:
    - TALLogoutSavesState
    - LoginwindowLaunchesRelaunchApps

# Finder

- name: Set Finder default view to column view
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: clmv

- name: Set Finder default search scope to current folder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: SCcf

- name: Set Finder default new window to OS volume
  community.general.osx_defaults:
    domain: com.apple.finder
    key: NewWindowTarget
    type: string
    value: OS volume

- name: Enable Finder boolean preferences
  community.general.osx_defaults:
    domain: com.apple.finder
    key: "{{ item }}"
    type: bool
    value: true
  loop:
    - _FXShowPosixPathInTitle
    - _FXSortFoldersFirst
    - _FXSortFoldersFirstOnDesktop
    - AppleShowAllFiles
    - ShowExternalHardDrivesOnDesktop
    - ShowHardDrivesOnDesktop
    - ShowMountedServersOnDesktop
    - ShowPathbar
    - ShowRemovableMediaOnDesktop
    - ShowStatusBar

- name: Disable Finder extension change warning
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXEnableExtensionChangeWarning
    type: bool
    value: false

# Global domain

- name: Show all filename extensions
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true

- name: Disable App Nap
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAppSleepDisabled
    type: bool
    value: true

# Handoff

- name: Disable Handoff and Continuity
  community.general.osx_defaults:
    domain: com.apple.coreservices.useractivityd
    key: "{{ item }}"
    type: bool
    value: false
  loop:
    - ActivityReceivingEnabled
    - ActivityAdvertisingAllowed

# Universal Access

- name: Disable graphic effects
  community.general.osx_defaults:
    domain: com.apple.universalaccess
    key: "{{ item }}"
    type: bool
    value: true
  loop:
    - reduceMotion
    - reduceTransparency

# Screensaver

- name: Disable screensaver for current user
  community.general.osx_defaults:
    domain: com.apple.screensaver
    key: idleTime
    type: string
    value: "0"
    host: currentHost

- name: Disable asking for password after screensaver for current user
  community.general.osx_defaults:
    domain: com.apple.screensaver
    key: askForPassword
    type: bool
    value: false
    host: currentHost

- name: Disable the asking for password delay for current user
  community.general.osx_defaults:
    domain: com.apple.screensaver
    key: askForPasswordDelay
    type: int
    value: 0
    host: currentHost

- name: Disable screensaver at login window
  community.general.osx_defaults:
    domain: /Library/Preferences/com.apple.screensaver
    key: loginWindowIdleTime
    type: int
    value: 0
  become: true

# Keyboard

- name: Disable Keyboard Setup Assistant
  ansible.builtin.command:
    cmd: defaults write /Library/Preferences/com.apple.keyboardtype keyboardtype -dict-add "3-7582-0" -int 40
  become: true
  changed_when: true

# Filesystem visibility

- name: Unhide ~/Library folder
  ansible.builtin.command:
    cmd: chflags nohidden /Users/{{ macos_admin_user }}/Library
  changed_when: true

- name: Unhide /Volumes folder
  ansible.builtin.command:
    cmd: chflags nohidden /Volumes
  become: true
  changed_when: true
