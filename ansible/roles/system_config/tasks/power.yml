---
- name: Disable system sleep
  ansible.builtin.command:
    cmd: systemsetup -setsleep Off
  become: true
  changed_when: true

- name: Disable energy saving sleep
  ansible.builtin.command:
    cmd: pmset -a sleep 0 displaysleep 0 disksleep 0
  become: true
  changed_when: true

- name: Disable hibernation
  ansible.builtin.command:
    cmd: pmset -a hibernatemode 0
  become: true
  changed_when: true

- name: Disable Power Nap
  ansible.builtin.command:
    cmd: pmset -a powernap 0
  become: true
  changed_when: true

- name: Keep network reachability prioritized during sleep
  ansible.builtin.command:
    cmd: pmset -a networkoversleep 1
  become: true
  changed_when: true

- name: Prevent sleep when SSH/TTY sessions are active
  ansible.builtin.command:
    cmd: pmset -a ttyskeepawake 1
  become: true
  changed_when: true

- name: Maintain TCP connections during light sleep
  ansible.builtin.command:
    cmd: pmset -a tcpkeepalive 1
  become: true
  changed_when: true

- name: Disable standby (deep idle sleep)
  ansible.builtin.command:
    cmd: pmset -a standby 0
  become: true
  changed_when: true

- name: Enable Wake-on-LAN
  ansible.builtin.command:
    cmd: pmset -a womp 1
  become: true
  changed_when: true

- name: Enable auto-restart after power failure
  ansible.builtin.command:
    cmd: pmset -a autorestart 1
  become: true
  changed_when: true

# powermode has three modes:
#   0 = Balanced (default)
#   1 = Low Power Mode
#   2 = High Power Mode (if supported)
# It's not super easy to determine if the system supports High Power Mode,
# so we set it to Balanced first, then attempt to switch to High Power Mode.
# If the system doesn't support High Power Mode, the command will print a warning,
# but the command will still succeed.
- name: Set power mode to balanced
  ansible.builtin.command:
    cmd: pmset -a powermode 0
  become: true
  changed_when: true

- name: Attempt to set power mode to high performance
  ansible.builtin.command:
    cmd: pmset -a powermode 2
  become: true
  changed_when: true
  failed_when: false

- name: Delete sleep image file
  ansible.builtin.file:
    path: /var/vm/sleepimage
    state: absent
  become: true

- name: Disable Time Machine
  ansible.builtin.command:
    cmd: tmutil disable
  become: true
  changed_when: true
