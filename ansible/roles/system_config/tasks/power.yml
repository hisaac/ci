---
- name: Check system sleep state
  ansible.builtin.command:
    cmd: systemsetup -getsleep
  become: true
  register: system_config_sleep_state
  changed_when: false

- name: Disable system sleep
  ansible.builtin.command:
    cmd: systemsetup -setsleep Off
  become: true
  changed_when: true
  when: "'Never' not in system_config_sleep_state.stdout"

- name: Check pmset settings
  ansible.builtin.shell:
    cmd: set -o pipefail && pmset -g custom | awk '$1 == "{{ item.key }}" && $2 != "{{ item.value }}" { exit 1 }'
    executable: /bin/bash
  become: true
  register: system_config_pmset_setting_checks
  changed_when: false
  failed_when: false
  loop:
    - key: sleep
      value: "0"
      command: pmset -a sleep 0
    - key: displaysleep
      value: "0"
      command: pmset -a displaysleep 0
    - key: disksleep
      value: "0"
      command: pmset -a disksleep 0
    - key: hibernatemode
      value: "0"
      command: pmset -a hibernatemode 0
    - key: powernap
      value: "0"
      command: pmset -a powernap 0
    - key: networkoversleep
      value: "1"
      command: pmset -a networkoversleep 1
    - key: ttyskeepawake
      value: "1"
      command: pmset -a ttyskeepawake 1
    - key: tcpkeepalive
      value: "1"
      command: pmset -a tcpkeepalive 1
    - key: standby
      value: "0"
      command: pmset -a standby 0

- name: Apply pmset settings
  ansible.builtin.command:
    cmd: "{{ item.item.command }}"
  become: true
  changed_when: true
  loop: "{{ system_config_pmset_setting_checks.results }}"
  when: item.rc != 0

- name: Check AC power mode
  ansible.builtin.shell:
    cmd: set -o pipefail && pmset -g custom | awk '/^AC Power:/{f=1;next} /^[^[:space:]]/{f=0} f && $1=="powermode" && $2!="2"{exit 1}'
    executable: /bin/bash
  become: true
  register: system_config_pmset_ac_powermode_check
  changed_when: false
  failed_when: false

- name: Check AC Wake-on-LAN setting
  ansible.builtin.shell:
    cmd: set -o pipefail && pmset -g custom | awk '/^AC Power:/{f=1;next} /^[^[:space:]]/{f=0} f && $1=="womp" && $2!="1"{exit 1}'
    executable: /bin/bash
  become: true
  register: system_config_pmset_ac_womp_check
  changed_when: false
  failed_when: false

- name: Enable Wake-on-LAN on AC power
  ansible.builtin.command:
    cmd: pmset -c womp 1
  become: true
  changed_when: true
  when: system_config_pmset_ac_womp_check.rc != 0

- name: Check AC auto-restart setting
  ansible.builtin.shell:
    cmd: set -o pipefail && pmset -g custom | awk '/^AC Power:/{f=1;next} /^[^[:space:]]/{f=0} f && $1=="autorestart" && $2!="1"{exit 1}'
    executable: /bin/bash
  become: true
  register: system_config_pmset_ac_autorestart_check
  changed_when: false
  failed_when: false

- name: Enable auto-restart after power failure on AC power
  ansible.builtin.command:
    cmd: pmset -c autorestart 1
  become: true
  changed_when: true
  when: system_config_pmset_ac_autorestart_check.rc != 0

- name: Attempt to set AC power mode to high performance
  ansible.builtin.command:
    cmd: pmset -c powermode 2
  become: true
  changed_when: true
  failed_when: false
  when: system_config_pmset_ac_powermode_check.rc != 0

- name: Delete sleep image file
  ansible.builtin.file:
    path: /var/vm/sleepimage
    state: absent
  become: true

- name: Check if Time Machine automatic backups are disabled
  ansible.builtin.shell:
    cmd: set -o pipefail && defaults read /Library/Preferences/com.apple.TimeMachine AutoBackup 2>/dev/null | grep -qx '0'
    executable: /bin/bash
  become: true
  register: system_config_time_machine_disabled
  changed_when: false
  failed_when: false

- name: Disable Time Machine
  ansible.builtin.command:
    cmd: tmutil disable
  become: true
  changed_when: true
  when: system_config_time_machine_disabled.rc != 0
