[settings]
activate_aggressive = true
experimental = true
lockfile = true

[tools]
"pipx:ansible-lint" = "latest"
ansible = { version = "latest", pipx_args = "--include-deps", uvx = false }
hk = "latest"
jq = "latest"
packer = "latest"
pkl = "latest"
python = "latest"
shellcheck = "latest"
shfmt = "latest"
tart = "latest"
tombi = "latest"
usage = "latest"
yamlfmt = "latest"
ruff = "latest"
uv = "latest"
xcodes = "latest"

[hooks]
postinstall = '''
if [ "$CI" = "true" ]; then
	mise run bootstrap-ci
else
	mise run bootstrap
fi
'''

# Tasks

[task_config]
includes = ["scripts"]

[tasks.bootstrap]
run = [{ task = "_bootstrap_hk" }, { task = "_bootstrap_ansible" }]

[tasks.bootstrap_ci]
run = [{ task = "_bootstrap_ansible" }]

[tasks.check]
alias = ["chk", "lint"]
run = "hk check --all"

[tasks.fix]
alias = ["fmt", "format"]
run = "hk fix --all"

[tasks.setup-ssh-key]
depends = ["run-tart-vms"]
run = """
if [[ ! -f ~/.ssh/ansible_ci ]]; then
	ssh-keygen -t ed25519 -C "ansible-ci" -f ~/.ssh/ansible_ci -N ""
else
	echo "~/.ssh/ansible_ci already exists, skipping key generation"
fi

declare -a vms=(
	# macos:15
	macos:26
)
for vm in "${vms[@]}"; do
	echo "Installing key on $vm..."
	ssh-copy-id -o PubkeyAuthentication=no -i ~/.ssh/ansible_ci.pub admin@$(tart ip "$vm")
done
"""

[tasks.run-tart-vms]
run = """
declare -a vms=(
	# macos:15
	macos:26
)
for vm in "${vms[@]}"; do
	nohup tart run "$vm" > /dev/null 2>&1 &
	echo "Waiting for $vm to have an IP..."
	until tart ip "$vm" &>/dev/null; do sleep 2; done
	ip=$(tart ip "$vm")
	echo "Waiting for $vm SSH to be ready..."
	until nc -z "$ip" 22 &>/dev/null; do sleep 2; done
	echo "$vm is ready"
done
"""

[tasks.shutdown-tart-vms]
run = """
declare -a vms=(
	# macos:15
	macos:26
)
for vm in "${vms[@]}"; do
	ip=$(tart ip "$vm" 2>/dev/null) || continue
	echo "Shutting down $vm..."
	ssh -i ~/.ssh/ansible_ci -o StrictHostKeyChecking=no admin@"$ip" "sudo shutdown -h now" || true
done
"""

[tasks.provision]
depends = ["run-tart-vms"]
run = "ansible-playbook playbooks/provision.yml -v"

[tasks.refresh-tart-vms]
alias = "r"
run = [
  "tart delete macos:15 || true",
  "tart delete macos:26 || true",
  "tart clone macos:15.6.1-frozen macos:15",
  "tart clone macos:26.4.1-frozen macos:26",
]

[tasks.upd]
run = ["mise upgrade", "mise lock"]

[tasks.upg]
run = ["mise upgrade --bump", "mise lock"]

# Hidden Tasks

[tasks._bootstrap_hk]
hide = true
run = ["hk install --mise", { task = "update-hk-import" }]

[tasks._bootstrap_ansible]
hide = true
run = [
  "ansible-galaxy role install --roles-path ./galaxy_roles -r requirements.yml",
  "ansible-galaxy collection install --collections-path ./galaxy_collections -r requirements.yml",
]
