[settings]
activate_aggressive = true
experimental = true
lockfile = true
python.uv_venv_auto = "create|source"

[env]
_.python.venv = { path = ".venv", create = true }

[tools]
hk = "latest"
jq = "latest"
packer = "latest"
pkl = "latest"
python = { version = "latest", uv = true }
ruff = "latest"
shellcheck = "latest"
shfmt = "latest"
tart = "latest"
tombi = "latest"
usage = "latest"
uv = "latest"
xcodes = "latest"
yamlfmt = "latest"

[hooks]
postinstall = '''
if [ "$CI" = "true" ]; then
	mise run bootstrap-ci
else
	mise run bootstrap
fi
'''

# Tasks

[task_config]
includes = ["scripts"]

[tasks.bootstrap]
run = [{ task = "_bootstrap_hk" }, { task = "_bootstrap_ansible" }]

[tasks.bootstrap_ci]
run = [{ task = "_bootstrap_ansible" }]

[tasks.check]
alias = ["chk", "lint"]
run = "hk check --all"

[tasks.fix]
alias = ["fmt", "format"]
run = "hk fix --all"

[tasks.run-tart-vms]
usage = 'arg "[vm]" help="Specific Tart VM to start (e.g. macos:15). Starts all VMs if omitted." default=""'
run = """
declare -a vms=(
	macos:15
	macos:26
)
if [ -n "${usage_vm:-}" ]; then
	vms=("$usage_vm")
fi
for vm in "${vms[@]}"; do
	nohup tart run "$vm" > /dev/null 2>&1 &
	echo "Waiting for $vm to have an IP..."
	until tart ip "$vm" &>/dev/null; do sleep 2; done
	ip=$(tart ip "$vm")
	echo "Waiting for $vm SSH to be ready..."
	until nc -z "$ip" 22 &>/dev/null; do sleep 2; done
	echo "$vm is ready"
done
"""

[tasks.shutdown-tart-vms]
run = 'ansible tart_agents -m ansible.builtin.command -a "shutdown -h now" -b || true'

[tasks.verify-xcode-cache]
run = "ansible-playbook playbooks/preflight-xcode-cache.yml --tags preflight"

[tasks.provision]
depends = ["run-tart-vms"]
run = "ansible-playbook playbooks/provision.yml"

[tasks.provision-15]
depends = [{ task = "run-tart-vms", args = ["macos:15"] }]
run = "ansible-playbook playbooks/provision.yml --limit macos_15_agents"

[tasks.provision-26]
depends = [{ task = "run-tart-vms", args = ["macos:26"] }]
run = "ansible-playbook playbooks/provision.yml --limit macos_26_agents"

[tasks.refresh-tart-vms]
alias = "r"
run = [
  "tart delete macos:15 || true",
  "tart delete macos:26 || true",
  "tart clone macos:15.6.1-frozen macos:15",
  "tart clone macos:26.5.0-frozen macos:26",
]

[tasks.upd]
run = ["mise upgrade", "mise lock", "uv sync --upgrade"]

[tasks.upg]
run = [
  "mise upgrade --bump",
  "mise lock",
  "uv sync --upgrade",
  "ansible-galaxy role install -r requirements.yml --force",
  "ansible-galaxy collection install -r requirements.yml --upgrade",
]

# Hidden Tasks

[tasks._bootstrap_hk]
hide = true
run = ["hk install --mise", { task = "update-hk-import" }]

[tasks._bootstrap_ansible]
hide = true
run = [
  "uv sync --group ansible",
  "ansible-galaxy role install -r requirements.yml",
  "ansible-galaxy collection install -r requirements.yml",
]
