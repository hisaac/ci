---
- name: Find simulator runtime .dmg files in local cache
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/../.cache/simruntime"
    patterns: "*.dmg"
  delegate_to: localhost
  become: false
  register: xcode_simruntime_files

- name: Select simulator runtime .dmg files to install
  ansible.builtin.set_fact:
    xcode_selected_simruntime_files: []
  changed_when: false

- name: Build simulator runtime .dmg selection list
  ansible.builtin.set_fact:
    xcode_selected_simruntime_files: "{{ xcode_selected_simruntime_files + [item] }}"
  loop: "{{ xcode_simruntime_files.files }}"
  when: (xcode_cache_simruntime_dmg_files | length == 0) or ((item.path | basename) in xcode_cache_simruntime_dmg_files)
  changed_when: false

- name: List installed simulator runtimes
  ansible.builtin.command:
    argv:
      - xcrun
      - simctl
      - runtime
      - list
      - -j
  become: true
  register: xcode_installed_simruntimes_raw
  changed_when: false

- name: Set installed simulator runtime versions
  ansible.builtin.set_fact:
    xcode_installed_simruntime_versions: >-
      {{
        (xcode_installed_simruntimes_raw.stdout | from_json).values()
        | map(attribute='version')
        | map('regex_replace', '(\\.0)+$', '')
        | unique
        | list
      }}
  changed_when: false

- name: Initialize missing simulator runtime list
  ansible.builtin.set_fact:
    xcode_missing_simruntime_files: []
  changed_when: false

- name: Build missing simulator runtime list
  ansible.builtin.set_fact:
    xcode_missing_simruntime_files: "{{ xcode_missing_simruntime_files + [item] }}"
  loop: "{{ xcode_selected_simruntime_files }}"
  when: >-
    ((item.path | basename | regex_search('[0-9]+(\\.[0-9]+){1,2}')) | regex_replace('(\\.0)+$', '')) not in xcode_installed_simruntime_versions
  changed_when: false

- name: Install missing simulator runtimes from cache
  when: xcode_missing_simruntime_files | length > 0
  block:
    - name: Create temp directory for simulator runtime cache on remote
      ansible.builtin.tempfile:
        state: directory
        suffix: simruntime_cache
      register: xcode_simruntime_tmpdir

    - name: Copy missing simulator runtime .dmg files to remote
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ xcode_simruntime_tmpdir.path }}/{{ item.path | basename }}"
        mode: "0644"
      loop: "{{ xcode_missing_simruntime_files }}"

    - name: Install simulator runtimes
      ansible.builtin.command:
        cmd: xcrun simctl runtime add {{ xcode_simruntime_tmpdir.path }}/{{ item.path | basename }}
      become: true
      register: xcode_simruntime_install
      changed_when: xcode_simruntime_install.rc == 0
      failed_when:
        - xcode_simruntime_install.rc != 0
        - "'Duplicate of' not in xcode_simruntime_install.stdout"
      loop: "{{ xcode_missing_simruntime_files }}"

    - name: Remove simulator runtime cache from remote
      ansible.builtin.file:
        path: "{{ xcode_simruntime_tmpdir.path }}"
        state: absent
