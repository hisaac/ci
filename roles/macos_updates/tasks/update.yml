---
- name: Check for available updates
  ansible.builtin.command: softwareupdate --all --list
  register: macos_updates_swupdate_list
  changed_when: false
  failed_when: false

- name: Parse available updates
  ansible.builtin.set_fact:
    macos_updates_available_updates: >-
      {{ macos_updates_swupdate_list.stdout
         | regex_findall('\* Label: (.*)\n\tTitle: (.*), Version: (.*), Size: (.*), Recommended: (.*), Action: (.*),')
         | map('zip', ['label', 'title', 'version', 'size', 'recommended', 'action'])
         | map('map', 'reverse')
         | map('community.general.dict')
         | list }}
  changed_when: false

- name: Print available updates
  ansible.builtin.debug:
    var: macos_updates_available_updates

- name: Print macOS update install notice
  ansible.builtin.debug:
    msg: >-
      Installing {{ macos_updates_available_updates | length }} macOS update(s) — this may take a long time...
  when: macos_updates_available_updates | length > 0

- name: Install available updates
  ansible.builtin.command:
    cmd: "softwareupdate --install --agree-to-license --force --user {{ macos_admin_user }} --stdinpass '{{ item.label }}'"
    stdin: "{{ macos_admin_password }}"
  changed_when: macos_updates_swupdate_install.rc == 0
  become: true
  register: macos_updates_swupdate_install
  ignore_errors: true
  loop: "{{ macos_updates_available_updates }}"
  async: 1800
  poll: 30
  when: >-
    not item.label.startswith('macOS') or item.version.split('.')[0] == ansible_facts['distribution_version'].split('.')[0]

- name: Check if any updates were actually installed
  ansible.builtin.set_fact:
    macos_updates_installed: "{{ (macos_updates_swupdate_install.results | default([])) | selectattr('changed') | list | length > 0 }}"
  changed_when: false

- name: Reboot after macOS updates
  ansible.builtin.reboot:
    reboot_timeout: 1800
  become: true
  when: macos_updates_installed | default(false)
