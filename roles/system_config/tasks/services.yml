---
# Note: These tasks require SIP to be disabled on the target system.
# launchctl bootout returns non-zero if the service is not running; failed_when: false handles that.

- name: Disable GUI-level launch agents
  ansible.builtin.command:
    cmd: launchctl bootout "gui/{{ ansible_user_uid }}" {{ item }}
  loop:
    - /System/Library/LaunchAgents/com.apple.notificationcenterui.plist
    - /System/Library/LaunchAgents/com.apple.tipsd.plist
  failed_when: false
  changed_when: true

- name: Disable system-level launch daemons
  ansible.builtin.command:
    cmd: launchctl bootout system {{ item }}
  become: true
  loop:
    - /System/Library/LaunchDaemons/com.apple.backupd.plist
    - /System/Library/LaunchDaemons/com.apple.backupd-helper.plist
    - /System/Library/LaunchDaemons/com.apple.SubmitDiagInfo.plist
    - /System/Library/LaunchDaemons/com.apple.apsd.plist
  failed_when: false
  changed_when: true
